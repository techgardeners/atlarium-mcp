apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: atlarium-mcp
  labels:
    app.kubernetes.io/name: atlarium-mcp
    app.kubernetes.io/part-of: atlarium
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: 128k
    nginx.ingress.kubernetes.io/proxy-read-timeout: "35"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "35"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - mcp.atlarium.bio
      secretName: atlarium-mcp-tls
  rules:
    - host: mcp.atlarium.bio
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: atlarium-mcp
                port:
                  name: http
