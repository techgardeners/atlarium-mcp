apiVersion: v1
kind: ConfigMap
metadata:
  name: atlarium-mcp-config
  labels:
    app.kubernetes.io/name: atlarium-mcp
    app.kubernetes.io/part-of: atlarium
data:
  NODE_ENV: production
  MCP_SERVICE_NAME: Atlarium Habitat Database MCP
  MCP_VERSION: 2.0.0
  MCP_PORT: "43118"
  MCP_PUBLIC_BASE_URL: https://mcp.atlarium.bio
  ATLARIUM_API_BASE_URL: https://atlarium.bio/api/public/mcp/v1
  MCP_DEFAULT_LANGUAGE: en
  MCP_RATE_LIMIT_ENABLED: "true"
  MCP_RATE_LIMIT_WINDOW_MS: "60000"
  MCP_RATE_LIMIT_MAX: "120"
  MCP_ALLOWED_HOSTS: mcp.atlarium.bio,atlarium.bio
  MCP_TRUST_PROXY: "1"
  ATLARIUM_API_TIMEOUT_MS: "5000"
  ATLARIUM_API_RESPONSE_MAX_BYTES: "1048576"
