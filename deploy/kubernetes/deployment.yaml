apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlarium-mcp
  labels:
    app.kubernetes.io/name: atlarium-mcp
    app.kubernetes.io/part-of: atlarium
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: atlarium-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: atlarium-mcp
        app.kubernetes.io/part-of: atlarium
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: atlarium-mcp
          image: ghcr.io/techgardeners/atlarium-mcp:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 43118
          envFrom:
            - configMapRef:
                name: atlarium-mcp-config
          readinessProbe:
            httpGet:
              path: /health
              port: http
              httpHeaders:
                - name: Host
                  value: mcp.atlarium.bio
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
              httpHeaders:
                - name: Host
                  value: mcp.atlarium.bio
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
